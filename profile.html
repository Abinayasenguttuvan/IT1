<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Client Dashboard</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* Reset */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body, html { height:100%; transition: background 0.3s, color 0.3s; }
body { background: url('./h3.webp') no-repeat center center/cover; color:#fff; }
body::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index:0; }

.dashboard { display:flex; position:relative; z-index:1; height:100vh; }

/* Sidebar */
.sidebar {
  width:250px; background: rgba(0,0,0,0.25); backdrop-filter: blur(15px);
  color:#fff; display:flex; flex-direction:column; padding:20px;
}
.sidebar h2 { text-align:center; color:#5f5cff;margin-bottom:30px; text-shadow:0 0 10px #5f5cff; }
.sidebar a { text-decoration:none; color:#c0c0c0; margin:10px 0; padding:10px; border-radius:8px; display:flex; align-items:center; transition:0.3s; }
.sidebar a i { margin-right:10px; }
.sidebar a:hover { background: rgba(0,255,255,0.2); color:#5f5cff; }

/* Main */
.main { flex:1; display:flex; flex-direction:column; padding:20px; overflow-y:auto; }

/* Topbar */
.topbar { display:flex; justify-content:space-between; align-items:center; background: rgba(255,255,255,0.05); padding:15px 20px; border-radius:10px; backdrop-filter: blur(10px); margin-bottom:20px; box-shadow:0 0 15px rgba(0,255,255,0.2); }
.user-info { display:flex; align-items:center; gap:10px; color:#c0c0c0; }
.user-info i { color:#5f5cff;}
.logo { height:40px; }

/* Sections */
.section { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius:15px; padding:20px; margin-bottom:20px; }
.section h3 { color:#5f5cff; margin-bottom:15px; }
.section label { display:block; margin-bottom:5px; font-weight:bold; }
.section input[type=text], .section input[type=email], .section input[type=password], .section input[type=tel] { width:100%; padding:10px; border-radius:8px; border:none; background: rgba(255,255,255,0.05); color:#fff; margin-bottom:15px; }
.section button { padding:10px 15px; border:none; border-radius:8px; cursor:pointer; background:#5f5cff; color:#000; font-weight:bold; transition:0.3s; }
.section button:hover { background:#00aaaa; }

/* Toggle */
.toggle { position:relative; display:inline-block; width:50px; height:24px; }
.toggle input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:0.4s; border-radius:24px; }
.slider:before { position:absolute; content:''; height:18px; width:18px; left:3px; bottom:3px; background:white; transition:0.4s; border-radius:50%; }
input:checked + .slider { background:#5f5cff; }
input:checked + .slider:before { transform:translateX(26px); }

/* Dark mode */
body.dark-mode { background:#111; color:#fff; }
body.dark-mode .section { background: rgba(255,255,255,0.05); }

@media(max-width:992px){
  .dashboard{flex-direction:column;}
  .sidebar{width:100%; flex-direction:row; overflow-x:auto;}
  .sidebar a{flex:1; justify-content:center;}
  .main{padding:15px;}
}

/* ================= RESPONSIVE ================= */

/* Large Desktop (1200px+) */
@media (min-width:1200px){
  .section {
    max-width:100%;
  }
}

/* Laptop (992px - 1199px) */
@media (max-width:1199px){
  .main {
    padding:18px;
  }
}

/* Tablet (768px - 991px) */
@media (max-width:991px){

  .dashboard {
    flex-direction:column;
    height:auto;
  }

  .sidebar {
    width:100%;
    flex-direction:row;
    overflow-x:auto;
    gap:10px;
    padding:10px;
  }

  .sidebar h2 {
    display:none;
  }

  .sidebar a {
    flex:0 0 auto;
    justify-content:center;
    font-size:13px;
    padding:8px 12px;
  }

  .main {
    padding:15px;
  }

  .topbar {
    flex-direction:column;
    gap:10px;
    text-align:center;
  }

  .user-info {
    justify-content:center;
  }

  .section {
    padding:18px;
  }
}

/* Mobile (max 767px) */
@media (max-width:767px){

  body {
    background-position:center;
  }

  .main {
    padding:10px;
  }

  .topbar {
    flex-direction:column;
    gap:8px;
    text-align:center;
  }

  .logo {
    height:30px;
  }

  .user-info {
    flex-direction:column;
    font-size:12px;
  }

  .section {
    padding:15px;
    border-radius:12px;
  }

  .section h3 {
    font-size:16px;
  }

  .section label {
    font-size:13px;
  }

  .section input {
    padding:8px;
    font-size:13px;
  }

  .section button {
    width:100%;
    padding:10px;
    font-size:14px;
  }

  /* Toggle alignment fix */
  .toggle {
    transform:scale(0.9);
  }
}
</style>
</head>
<body>

<div class="dashboard">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Client Panel</h2>
    <a href="./client.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="./alert.html"><i class="fas fa-bell"></i> Alerts</a>
    <a href="./report.html"><i class="fas fa-file-alt"></i> Reports</a>
    <a href="./profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="./login.html" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
   
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <img src="./logo.webp" alt="Stackly Logo" class="logo">
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span id="username">User</span>
        <span id="email">email@example.com</span>
      </div>
    </div>

    <!-- Profile Section -->
    <div class="section">
      <h3>Profile Information</h3>
      <label>Name:</label>
      <input type="text" id="name" placeholder="Enter Name">
      <label>Email:</label>
      <input type="email" id="emailInput" placeholder="Enter Email">
      <label>Phone:</label>
      <input type="tel" id="phone" placeholder="Enter Phone">
      <button onclick="updateProfile()">Update Profile</button>
    </div>

    <!-- Change Password -->
    <div class="section">
      <h3>Change Password</h3>
      <label>Current Password:</label>
      <input type="password" id="currentPass" placeholder="Current Password">
      <label>New Password:</label>
      <input type="password" id="newPass" placeholder="New Password">
      <label>Confirm New Password:</label>
      <input type="password" id="confirmPass" placeholder="Confirm Password">
      <button onclick="changePassword()">Change Password</button>
    </div>

    <!-- Preferences -->
    <div class="section">
      <h3>Notification Preferences</h3>
      <label>Email Alerts:</label>
      <label class="toggle">
        <input type="checkbox" id="emailAlerts">
        <span class="slider"></span>
      </label>
      <br><br>
      <label>SMS Alerts:</label>
      <label class="toggle">
        <input type="checkbox" id="smsAlerts">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Dark Mode -->
    <div class="section">
      <h3>Display Settings</h3>
      <label>Dark Mode:</label>
      <label class="toggle">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
    </div>

  </div>
</div>

<script>
// Load user info
const user = JSON.parse(localStorage.getItem('loggedUser') || sessionStorage.getItem('loggedUser'));
if(user){
  document.getElementById('username').textContent = user.accountType.toUpperCase();
  document.getElementById('email').textContent = user.email;
  document.getElementById('name').value = user.accountType;
  document.getElementById('emailInput').value = user.email;
  document.getElementById('phone').value = user.phone || '';
} else {
  alert('Not logged in!');
  window.location.href='login.html';
}

function logout(){
  localStorage.removeItem('loggedUser');
  sessionStorage.removeItem('loggedUser');
  window.location.href='login.html';
}

// Update Profile with validation
function updateProfile(){
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if(!name || !email || !phone){
    alert('Please fill in all details!');
    return;
  }

  alert(`Profile Updated!\nName: ${name}\nEmail: ${email}\nPhone: ${phone}`);

  if(user){
    user.accountType = name;
    user.email = email;
    user.phone = phone;
    localStorage.setItem('loggedUser', JSON.stringify(user));
    document.getElementById('username').textContent = name.toUpperCase();
    document.getElementById('email').textContent = email;
  }
}

// Change Password
function changePassword(){
  const current = document.getElementById('currentPass').value;
  const newP = document.getElementById('newPass').value;
  const confirmP = document.getElementById('confirmPass').value;
  if(newP !== confirmP){ alert('Passwords do not match!'); return; }
  alert('Password changed successfully!');
}

// Dark Mode Toggle
const toggle = document.getElementById('darkModeToggle');
toggle.addEventListener('change', ()=>{
  document.body.classList.toggle('dark-mode', toggle.checked);
});
</script>

</body>
</html>
